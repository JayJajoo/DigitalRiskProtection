services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: drp-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: drp-backend
    env_file:
      - path: .env
        required: false
    environment:
      # Override for in-network service discovery (beats the .env localhost value)
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CHROMA_PERSIST_DIR=/app/data/chroma
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    depends_on:
      elasticsearch:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: drp-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  es-data:
